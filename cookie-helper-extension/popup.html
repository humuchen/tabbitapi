<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Tabbit 抓取工具</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", sans-serif; width: 560px; margin: 0; padding: 14px; font-size: 13px; color: #1a1a1a; }
    h2 { font-size: 15px; margin: 0 0 10px; }
    h3 { font-size: 13px; margin: 14px 0 6px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .status { margin-bottom: 8px; padding: 6px 8px; background: #f0f4ff; border-radius: 4px; font-size: 12px; }
    .names { margin-bottom: 8px; font-size: 11px; color: #666; max-height: 50px; overflow-y: auto; word-break: break-all; }
    textarea { width: 100%; height: 60px; box-sizing: border-box; font-family: Consolas, monospace; font-size: 11px; border: 1px solid #ccc; border-radius: 4px; padding: 6px; resize: vertical; }
    .btns { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    button { flex: 1; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; min-width: 120px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .copy { background: #2563eb; color: #fff; }
    .copy:hover { background: #1d4ed8; }
    .copy2 { background: #059669; color: #fff; }
    .copy2:hover { background: #047857; }
    .copy3 { background: #7c3aed; color: #fff; }
    .copy3:hover { background: #6d28d9; }
    .clear { background: #f3f4f6; color: #374151; flex: 0 0 auto; min-width: 80px; }
    .done { background: #16a34a !important; color: #fff !important; }
    .hint { margin-top: 6px; font-size: 11px; color: #888; line-height: 1.5; }
    .empty { color: #999; font-style: italic; padding: 10px; text-align: center; }
    pre { background: #f6f8fa; border: 1px solid #e1e4e8; border-radius: 4px; padding: 8px; font-size: 11px; max-height: 200px; overflow: auto; white-space: pre-wrap; word-break: break-all; margin: 0; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <h2>Tabbit 抓取工具</h2>

  <h3>① Cookie 导出</h3>
  <div id="cookieStatus" class="status">读取中…</div>
  <div id="cookieNames" class="names"></div>
  <textarea id="cookie" readonly placeholder="Cookie 字符串"></textarea>
  <div class="btns">
    <button id="copyCookie" class="copy">复制 Cookie</button>
  </div>

  <h3>② 会话请求 (POST /session/*)</h3>
  <div id="sessStatus" class="status">等待中…</div>
  <pre id="sessBox"><span class="empty">尚未抓到。新建/打开聊天时会触发。</span></pre>
  <div class="btns">
    <button id="copySess" class="copy3" disabled>复制 Session Header+Body</button>
  </div>

  <h3>③ 聊天请求 (POST /api/v1/chat/completion)</h3>
  <div id="hdrStatus" class="status">等待中…</div>
  <pre id="headerBox"><span class="empty">尚未抓到。发消息时会触发。</span></pre>
  <div class="btns">
    <button id="copyHdr" class="copy2" disabled>复制 Chat Header+Body</button>
    <button id="refreshHdr" class="clear">刷新</button>
    <button id="clearHdr" class="clear">清除</button>
  </div>

  <h3>最近请求</h3>
  <div id="recentList" style="max-height:100px;overflow-y:auto;border:1px solid #eee;border-radius:4px;padding:4px;font-size:10px"></div>
  <div class="hint">
    操作：打开 web.tabbit.ai → 新建/进入聊天 → 发一条消息。<br>
    抓到后点对应“复制”按钮，粘贴给助手。
  </div>

  <script src="popup.js"></script>
</body>
</html>
